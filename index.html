<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; 
        }

        body {
            background: radial-gradient(circle at center, #0a0f1e, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Microsoft YaHei', monospace;
            overflow: hidden;
            position: relative;
            cursor: crosshair;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(255, 0, 255, 0.03) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: 10;
            animation: glitchScan 4s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0) 0px, rgba(255,0,128,0.08) 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
            mix-blend-mode: overlay;
        }


        .gay-peng-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 2;
        }


        .peng-picture {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 32px;
            box-shadow: 0 0 0 4px rgba(255, 20, 147, 0.6),
                        0 0 0 8px rgba(0, 255, 255, 0.3),
                        0 0 40px rgba(255, 0, 255, 0.8),
                        0 0 120px rgba(255, 0, 100, 0.5);
            transition: all 0.2s ease;
            animation: borderPulse 1.2s infinite alternate, subtleShake 3s infinite;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="27" viewBox="0 0 24 27"><polygon points="2,2 22,13 12,25 2,13" fill="%23ff66cc" stroke="%23ff00aa" stroke-width="1.5"/><circle cx="12" cy="13" r="3" fill="white"/></svg>') 12 5, auto;
        }


        @keyframes borderPulse {
            0% {
                box-shadow: 0 0 0 2px rgba(255, 20, 147, 0.8),
                            0 0 0 6px rgba(0, 255, 255, 0.4),
                            0 0 30px rgba(255, 0, 200, 0.6);
                filter: drop-shadow(0 0 8px hotpink);
            }
            100% {
                box-shadow: 0 0 0 6px rgba(255, 80, 180, 1),
                            0 0 0 12px rgba(0, 200, 255, 0.7),
                            0 0 60px rgba(255, 0, 255, 1);
                filter: drop-shadow(0 0 18px magenta);
            }
        }


        @keyframes subtleShake {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            15% { transform: translate(1px, -1px) rotate(0.2deg); }
            30% { transform: translate(-1px, 2px) rotate(-0.3deg); }
            45% { transform: translate(2px, 1px) rotate(0.1deg); }
            60% { transform: translate(-1px, -1px) rotate(-0.2deg); }
            75% { transform: translate(1px, 0px) rotate(0.3deg); }
            90% { transform: translate(0px, 1px) rotate(-0.1deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }


        .floating-text {
            position: fixed;
            font-weight: bold;
            font-size: 1.6rem;
            white-space: nowrap;
            pointer-events: none;
            z-index: 20;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            text-shadow: 0 0 5px magenta, 0 0 12px cyan;
            animation: floatAround 12s linear infinite, rainbowColor 0.4s infinite;
            opacity: 0.85;
        }

        @keyframes floatAround {
            0% {
                transform: translateX(-10%) translateY(20vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateX(110vw) translateY(-10vh) rotate(360deg);
                opacity: 0;
            }

        @keyframes rainbowColor {
            0% { color: #ff66cc; text-shadow: 0 0 5px red; }
            25% { color: #ffaa44; text-shadow: 0 0 8px orange; }
            50% { color: #88ff88; text-shadow: 0 0 12px lime; }
            75% { color: #66ffff; text-shadow: 0 0 15px cyan; }
            100% { color: #ff66ff; text-shadow: 0 0 10px magenta; }

        .gay-meter {

            z-index: 30;

        @keyframes meterPulse {

            right: 25px;

            color: white;
            font-weight: bold;
            font-size: 1.2rem;

            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 0 12px rgba(255, 0, 170, 0.8);
            transition: 0.2s;
            z-index: 30;
            animation: wobble 1s infinite;
            letter-spacing: 2px;
        }

        .prank-button:hover {
            transform: scale(1.08);
            background: linear-gradient(45deg, #ff00aa, #ff66cc);
            box-shadow: 0 0 25px fuchsia;
        }

        @keyframes wobble {
            0%,100% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            75% { transform: rotate(-3deg); }
        }

        .rainbow-trail {
            position: fixed;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff00cc, #ff4444);
            pointer-events: none;
            z-index: 9999;
            filter: blur(2px);
            opacity: 0.8;
            transition: transform 0.05s;
            box-shadow: 0 0 8px cyan;

        .glitch-warning {
